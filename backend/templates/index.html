<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBROL | Consultoria Jurídica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { 'fundo': '#0a0a0a', 'texto-escuro': '#ffffff', 'primaria': '#991b1b', 'alerta': '#7f1d1d', 'secundaria': '#94a3b8' } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-fundo">
    
    {% include 'navbar.html' %}
    
    <main class="flex-grow max-w-6xl mx-auto px-4 py-8">
        {% include 'quem_somos.html' %}
        
        {% include 'registro.html' %}
        {% include 'login.html' %}
        
        {% include 'auditoria.html' %}
        {% include 'dashboard.html' %}
        {% include 'perfil.html' %}
    </main>

    <div id="modal-suporte" class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-75 z-[9999]">
        <div class="bg-gray-900 border border-red-900 p-8 rounded-lg w-96 shadow-2xl">
            <h2 class="text-white text-xl font-bold mb-4">Abrir Novo Ticket</h2>
            <input type="text" id="ticket-assunto" placeholder="Assunto" class="w-full bg-gray-800 text-white p-2 mb-4 rounded border border-gray-700">
            <textarea id="ticket-mensagem" placeholder="Sua mensagem..." class="w-full bg-gray-800 text-white p-2 mb-4 rounded border border-gray-700"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="document.getElementById('modal-suporte').classList.add('hidden')" class="text-gray-400 hover:text-white">Cancelar</button>
                <button onclick="enviarTicket()" class="bg-[#991b1b] text-white px-4 py-2 rounded">Enviar</button>
            </div>
        </div>
    </div>

   <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <script src="/static/app.js"></script>
    
    <script src="/static/client.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            console.log("Iniciando sistema...");
            await Auth.validarSessao(); // Agora vai funcionar!
            UI.trocarTela(KBROL.state.usuarioLogado ? 'tela-dashboard' : 'tela-login');
        });
    </script>
</body>
</html>
