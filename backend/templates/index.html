<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBROL | Consultoria Jurídica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { 
                        'fundo': '#0a0a0a', 
                        'texto-escuro': '#ffffff', 
                        'primaria': '#991b1b', 
                        'alerta': '#7f1d1d', 
                        'secundaria': '#94a3b8' 
                    } 
                } 
            } 
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-fundo">
    {% include 'navbar.html' %}
    
    <main class="flex-grow max-w-6xl mx-auto px-4 py-8">
        {% include 'quem_somos.html' %}
        {% include 'auth.html' %}
        {% include 'auditoria.html' %}
        {% include 'dashboard.html' %}
        {% include 'sugestoes.html' %}
        {% include 'perfil.html' %}
    </main>

    <div id="modal-suporte" 
         class="hidden fixed inset-0 flex items-center justify-center bg-black bg-opacity-75 z-[9999]">
        <div class="bg-gray-900 border border-red-900 p-8 rounded-lg w-96 shadow-2xl">
            <h2 class="text-white text-xl font-bold mb-4">Abrir Novo Ticket</h2>
            <input type="text" id="ticket-assunto" placeholder="Assunto" class="w-full bg-gray-800 text-white p-2 mb-4 rounded border border-gray-700">
            <textarea id="ticket-mensagem" placeholder="Sua mensagem..." class="w-full bg-gray-800 text-white p-2 mb-4 rounded border border-gray-700"></textarea>
            <div class="flex justify-end gap-2">
                <button onclick="fecharModalSuporte()" class="text-gray-400 hover:text-white">Cancelar</button>
                <button onclick="enviarTicket()" class="bg-[#991b1b] text-white px-4 py-2 rounded">Enviar</button>
            </div>
        </div>
    </div>

   <script src="/static/app.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 1. Valida a sessão antes de qualquer coisa
            await validarSessao();
            
            // 2. Decide qual tela mostrar com base na sessão
            // Se estiver logado, vai para o dashboard, senão para o login
            if (usuarioLogado) {
                trocarTela('tela-dashboard');
            } else {
                trocarTela('tela-login');
            }
        });
    </script>
</body>
</html>
