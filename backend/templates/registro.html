<div id="tela-registro" class="view-section hidden max-w-md mx-auto p-8 bg-gray-900 rounded-2xl shadow-2xl border border-gray-800">
    <h2 class="text-3xl font-black text-white text-center mb-6">Criar Conta</h2>
    
    <form id="form-registro" class="space-y-4" 
          onsubmit="event.preventDefault(); fazerCadastro(document.getElementById('reg-email').value, document.getElementById('reg-senha').value, document.getElementById('reg-nome').value);">
        
        <input type="text" id="reg-nome" placeholder="Nome Completo / Empresa" required class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none transition">
        <input type="email" id="reg-email" placeholder="Seu melhor e-mail" required class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none transition">
        <input type="password" id="reg-senha" placeholder="Crie uma senha forte" required class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none transition">
        
        <select id="reg-tipo" class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg outline-none">
            <option value="cpf">CPF</option>
            <option value="cnpj">CNPJ</option>
        </select>
        <input type="text" id="reg-doc" placeholder="Número do documento" required class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none transition">

        <div id="campos-opcionais" class="hidden space-y-4 border-t border-gray-700 pt-4">
            <input type="text" id="reg-tel" placeholder="Telefone (WhatsApp)" class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none">
            <input type="text" id="reg-uf" placeholder="UF" maxlength="2" class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none">
        </div>

        <button type="button" onclick="document.getElementById('campos-opcionais').classList.toggle('hidden')" class="text-sm text-gray-400 font-bold hover:text-white transition">
            + Adicionar dados opcionais agora
        </button>
        
        <button type="submit" class="w-full bg-[#991b1b] text-white py-3 rounded-lg font-bold hover:bg-[#7f1d1d] transition">
            Criar Conta
        </button>

        <div id="status-cadastro" class="hidden text-center mt-4 font-bold p-2 rounded"></div>
    </form>
</div>
