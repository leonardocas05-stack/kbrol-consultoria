<div id="tela-login" class="view-section hidden flex items-center justify-center min-h-[60vh] bg-[#0a0a0a]">
    <div class="max-w-md w-full bg-gray-900 p-8 rounded-2xl shadow-2xl border border-gray-800">
        <h2 class="text-3xl font-black text-white text-center mb-2">Acesso Restrito</h2>
        <p class="text-center text-gray-400 mb-8 text-sm">Entre com suas credenciais.</p>

        <form class="space-y-5" onsubmit="event.preventDefault(); fazerLogin(document.getElementById('login-email').value, document.getElementById('login-senha').value)">
            <div>
                <label class="block text-sm font-bold text-gray-400 mb-1">E-mail Corporativo</label>
                <input type="email" id="login-email" class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none transition" placeholder="advogado@escritorio.com.br" required>
            </div>
            <div>
                <label class="block text-sm font-bold text-gray-400 mb-1">Senha</label>
                <input type="password" id="login-senha" class="w-full p-3 bg-[#1a1a1a] border border-gray-700 text-white rounded-lg focus:border-[#991b1b] outline-none transition" placeholder="••••••••" required>
            </div>

            <button type="submit" class="w-full bg-[#991b1b] text-white font-bold py-3.5 rounded-lg shadow-lg hover:bg-[#7f1d1d] transition-all tracking-wide mt-2">
                Entrar na Plataforma
            </button>
        </form>
    </div>
</div>
